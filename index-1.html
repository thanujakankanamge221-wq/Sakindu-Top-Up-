<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Fire UID Checker</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.box{background:#fff;padding:25px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,.15);width:350px;text-align:center}
input{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;box-sizing:border-box}
#result{margin-top:15px;font-weight:bold}
.success{color:green}.error{color:red}
</style>
</head>
<body>
<div class="box">
<h2>Free Fire UID Checker</h2>
<input type="number" id="uid" placeholder="Enter Free Fire UID" onkeyup="checkUID()">
<div id="result"></div>
</div>
<script>
let timer;
function checkUID(){
 clearTimeout(timer);
 const uid=document.getElementById('uid').value;
 const result=document.getElementById('result');
 if(uid.length<5){result.innerHTML='';result.className='';return;}
 result.innerHTML='Checking...';
 timer=setTimeout(()=>{
   fetch('api.php?uid='+encodeURIComponent(uid))
   .then(r=>r.json())
   .then(data=>{
      if(data.status==='success'){
         result.className='success';
         result.innerHTML='Player: '+data.nickname;
      }else{
         result.className='error';
         result.innerHTML=data.message;
      }
   })
   .catch(()=>{
      result.className='error';
      result.innerHTML='Connection Error';
   });
 },500);
}
</script>
</body>
</html>
